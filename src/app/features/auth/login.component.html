<div style="margin: auto;margin-top: 180px" class="container login-container">
  <mat-card>
    <h2>CRM Login</h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Tenant ID</mat-label>
        <input matInput formControlName="tenantId" />
        <mat-error *ngIf="form.controls.tenantId.hasError('required')">Tenant ID is required</mat-error>
        <mat-error *ngIf="form.controls.tenantId.hasError('server')">{{ form.controls.tenantId.getError('server') }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
        <mat-error *ngIf="form.controls.email.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.controls.email.hasError('email')">Enter a valid email</mat-error>
        <mat-error *ngIf="form.controls.email.hasError('server')">{{ form.controls.email.getError('server') }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.controls.password.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="form.controls.password.hasError('minlength')">Minimum 6 characters required</mat-error>
        <mat-error *ngIf="form.controls.password.hasError('server')">{{ form.controls.password.getError('server') }}</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit">Sign In</button>
    </form>

    <small class="error" *ngIf="error">{{ error }}</small>
  </mat-card>
</div>
