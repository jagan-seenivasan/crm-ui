<mat-card>
  <h2>Create Lead</h2>

  <form [formGroup]="form" (ngSubmit)="create()" class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Lead Name *</mat-label>
      <input matInput formControlName="title" />
      <mat-error *ngIf="form.controls.title.hasError('required')">Lead name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
      <mat-error *ngIf="form.controls.email.hasError('email')">Enter a valid email</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Source/Company</mat-label>
      <input matInput formControlName="company" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Owner *</mat-label>
      <mat-select formControlName="ownerId">
        <mat-option value="">Select Owner</mat-option>
        <mat-option *ngFor="let user of users" [value]="user._id">{{ user.name }} ({{ user.email }})</mat-option>
      </mat-select>
      <mat-error *ngIf="form.controls.ownerId.hasError('required')">Owner is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Stage *</mat-label>
      <mat-select formControlName="stageId">
        <mat-option value="">Select Stage</mat-option>
        <mat-option *ngFor="let stage of stages" [value]="stage._id">{{ stage.name }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.controls.stageId.hasError('required')">Stage is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Deal Value</mat-label>
      <input matInput type="number" formControlName="value" />
      <mat-error *ngIf="form.controls.value.hasError('min')">Value cannot be negative</mat-error>
    </mat-form-field>

    <div class="actions-row">
      <button mat-raised-button color="primary" type="submit">Save</button>
      <button mat-stroked-button color="primary" type="button" routerLink="/leads">Cancel</button>
    </div>
  </form>

  <small class="error" *ngIf="error">{{ error }}</small>
</mat-card>
