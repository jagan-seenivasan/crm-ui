<mat-card>
  <h3>Stages</h3>

  <form [formGroup]="form" (ngSubmit)="save()" class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Stage Name *</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="form.controls.name.hasError('required')">Stage name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Order *</mat-label>
      <input matInput type="number" formControlName="order" />
      <mat-error *ngIf="form.controls.order.hasError('required')">Order is required</mat-error>
      <mat-error *ngIf="form.controls.order.hasError('min')">Order must be at least 1</mat-error>
    </mat-form-field>

    <div class="actions-row">
      <button mat-raised-button color="primary" type="submit">{{ editId ? 'Update' : 'Create' }}</button>
      <button mat-stroked-button color="primary" type="button" *ngIf="editId" (click)="reset()">Cancel</button>
    </div>
  </form>

  <table class="stages-table">
    <tr><th align="left">Order</th><th align="left">Name</th><th align="left">Actions</th></tr>
    <tr *ngFor="let stage of stages">
      <td>{{ stage.order }}</td>
      <td>{{ stage.name }}</td>
      <td>
        <button mat-stroked-button color="primary" class="mr" (click)="startEdit(stage)">Edit</button>
        <button mat-stroked-button color="warn" (click)="remove(stage)">Delete</button>
      </td>
    </tr>
  </table>

  <small class="error" *ngIf="error">{{ error }}</small>
</mat-card>
