<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Create Opportunity' : 'Edit Opportunity' }}</h2>
<div mat-dialog-content>
  <form [formGroup]="form" class="form-grid">
    <mat-form-field appearance="outline"><mat-label>Name *</mat-label><input matInput formControlName="name" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Amount</mat-label><input matInput type="number" formControlName="amount" /></mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Stage *</mat-label>
      <mat-select formControlName="stageId">
        <mat-option *ngFor="let stage of data.stages" [value]="stage._id">{{ stage.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Account *</mat-label>
      <mat-select formControlName="accountId">
        <mat-option *ngFor="let account of data.accounts" [value]="account._id">{{ account.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Contact</mat-label>
      <mat-select formControlName="contactId">
        <mat-option value="">None</mat-option>
        <mat-option *ngFor="let contact of data.contacts" [value]="contact._id">{{ contact.firstName }} {{ contact.lastName }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="OPEN">OPEN</mat-option>
        <mat-option value="WON">WON</mat-option>
        <mat-option value="LOST">LOST</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline"><mat-label>Expected Close Date</mat-label><input matInput type="date" formControlName="expectedCloseDate" /></mat-form-field>
  </form>
</div>
<div mat-dialog-actions align="end">
  <button mat-stroked-button color="primary" (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</div>
